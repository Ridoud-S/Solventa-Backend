spring:
  application:
    name: solventa-backend

  # ── Perfil activo por defecto ──────────────────────────────────────────────
  profiles:
    active: dev

  # ── MVC ────────────────────────────────────────────────────────────────────
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ── Jackson ────────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

# ── JWT ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    expiration-ms: 28800000
    refresh-expiration-ms: 2592000000
  cors:
    allowed-origins: http://localhost:5173

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false